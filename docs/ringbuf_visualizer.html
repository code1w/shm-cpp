<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RingBuf SPSC 环形缓冲区可视化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
h1 { font-size: 1.5em; margin-bottom: 10px; color: #64ffda; }
.subtitle { font-size: 0.85em; color: #888; margin-bottom: 20px; }
.main { display: flex; gap: 24px; width: 100%; max-width: 1200px; flex-wrap: wrap; justify-content: center; }
.ring-panel { flex: 0 0 420px; display: flex; flex-direction: column; align-items: center; }
.right-panel { flex: 1; min-width: 340px; max-width: 500px; display: flex; flex-direction: column; gap: 16px; }
svg { filter: drop-shadow(0 0 20px rgba(100,255,218,0.1)); }

/* Controls */
.card { background: #16213e; border-radius: 12px; padding: 16px; border: 1px solid #2a2a4a; }
.card h3 { font-size: 0.95em; color: #64ffda; margin-bottom: 10px; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.controls label { font-size: 0.82em; color: #aaa; }
.controls input[type=number] { width: 60px; background: #0f3460; border: 1px solid #2a2a4a; color: #fff; padding: 5px 8px; border-radius: 6px; font-size: 0.85em; }
.btn { padding: 6px 16px; border: none; border-radius: 6px; font-size: 0.85em; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.btn:active { transform: scale(0.96); }
.btn-write { background: #00b894; color: #fff; }
.btn-write:hover { background: #00a381; }
.btn-force { background: #e17055; color: #fff; }
.btn-force:hover { background: #c9604b; }
.btn-read { background: #0984e3; color: #fff; }
.btn-read:hover { background: #0770c2; }
.btn-reset { background: #636e72; color: #fff; }
.btn-reset:hover { background: #535c60; }

/* State */
.state-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.82em; }
.state-item { background: #0f3460; padding: 6px 10px; border-radius: 6px; }
.state-label { color: #888; font-size: 0.78em; }
.state-val { color: #ffd43b; font-weight: 600; font-family: monospace; }

/* Log */
.log-box { max-height: 260px; overflow-y: auto; font-size: 0.78em; font-family: monospace; line-height: 1.6; }
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
.log-entry { padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
.log-write { color: #00b894; }
.log-read { color: #0984e3; }
.log-error { color: #e17055; }
.log-info { color: #888; }
.log-sentinel { color: #fd79a8; }

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.78em; margin-top: 8px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
</style>
</head>
<body>

<h1>RingBuf SPSC 环形缓冲区可视化</h1>
<div class="subtitle">无锁单生产者单消费者环形缓冲区 | Capacity = 128 bytes (16 slots x 8B)</div>

<div class="main">
  <div class="ring-panel">
    <svg id="ringSvg" width="400" height="400" viewBox="0 0 400 400"></svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#2a2a4a"></div>空闲</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#00b894"></div>MsgHeader</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#00cec9"></div>Payload</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#2d3436"></div>Padding</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#e17055"></div>哨兵</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#636e72"></div>已读(可回收)</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="card">
      <h3>操作</h3>
      <div class="controls">
        <label>Payload 大小:</label>
        <input type="number" id="payloadSize" value="10" min="1" max="56">
        <label>字节</label>
      </div>
      <div class="controls" style="margin-top: 8px;">
        <button class="btn btn-write" onclick="doTryWrite()">TryWrite</button>
        <button class="btn btn-force" onclick="doForceWrite()">ForceWrite</button>
        <button class="btn btn-read" onclick="doTryRead()">TryRead</button>
        <button class="btn btn-reset" onclick="doReset()">Reset</button>
      </div>
    </div>

    <div class="card">
      <h3>状态</h3>
      <div class="state-grid">
        <div class="state-item"><div class="state-label">write_pos (逻辑)</div><div class="state-val" id="sWritePos">0</div></div>
        <div class="state-item"><div class="state-label">read_pos (逻辑)</div><div class="state-val" id="sReadPos">0</div></div>
        <div class="state-item"><div class="state-label">phys_w = Mask(w)</div><div class="state-val" id="sPhysW">0</div></div>
        <div class="state-item"><div class="state-label">phys_r = Mask(r)</div><div class="state-val" id="sPhysR">0</div></div>
        <div class="state-item"><div class="state-label">已用空间</div><div class="state-val" id="sUsed">0 / 128</div></div>
        <div class="state-item"><div class="state-label">消息数 (seq)</div><div class="state-val" id="sSeq">0</div></div>
      </div>
    </div>

    <div class="card" style="flex: 1;">
      <h3>操作日志</h3>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// RingBuf simulation — mirrors ringbuf.hpp logic exactly
// ============================================================
const CAPACITY = 128;         // 2^7, 16 slots of 8 bytes
const SLOT_SIZE = 8;
const NUM_SLOTS = CAPACITY / SLOT_SIZE;
const MSG_HEADER_SIZE = 8;    // sizeof(MsgHeader): len(4) + seq(4)
const MAX_MSG_SIZE = CAPACITY / 2 - MSG_HEADER_SIZE;
const SENTINEL = 0xFFFFFFFF;

let write_pos = 0;   // uint64 logical
let read_pos = 0;    // uint64 logical
let nextSeq = 1;

// Simulated data region — byte array
let dataRegion = new Uint8Array(CAPACITY);
// Metadata per slot for visualization: 'free' | 'header' | 'payload' | 'pad' | 'sentinel' | 'read'
let slotMeta = new Array(NUM_SLOTS).fill('free');
// Message info per slot for tooltip
let slotInfo = new Array(NUM_SLOTS).fill('');

function frameSize(len) {
  return (MSG_HEADER_SIZE + len + 7) & ~7;
}
function mask(pos) {
  return pos & (CAPACITY - 1);
}

// Read a simulated uint32 at byte offset
function readU32(offset) {
  return dataRegion[offset] | (dataRegion[offset+1] << 8) |
         (dataRegion[offset+2] << 16) | ((dataRegion[offset+3] << 24) >>> 0);
}
function writeU32(offset, val) {
  dataRegion[offset]   = val & 0xFF;
  dataRegion[offset+1] = (val >> 8) & 0xFF;
  dataRegion[offset+2] = (val >> 16) & 0xFF;
  dataRegion[offset+3] = (val >> 24) & 0xFF;
}

function markSlots(physStart, numBytes, meta, info) {
  const startSlot = physStart / SLOT_SIZE;
  const count = numBytes / SLOT_SIZE;
  for (let i = 0; i < count; i++) {
    const idx = (startSlot + i) % NUM_SLOTS;
    slotMeta[idx] = meta;
    slotInfo[idx] = info || '';
  }
}

function markFrame(physStart, len, seq) {
  const total = frameSize(len);
  const slots = total / SLOT_SIZE;
  const startSlot = physStart / SLOT_SIZE;
  // First slot is always the header
  slotMeta[startSlot % NUM_SLOTS] = 'header';
  slotInfo[startSlot % NUM_SLOTS] = `seq=${seq} len=${len}`;
  // Payload + padding slots
  const payloadSlots = Math.ceil(len / SLOT_SIZE);
  for (let i = 1; i < slots; i++) {
    const idx = (startSlot + i) % NUM_SLOTS;
    if (i <= payloadSlots) {
      slotMeta[idx] = 'payload';
      slotInfo[idx] = `seq=${seq} payload`;
    } else {
      slotMeta[idx] = 'pad';
      slotInfo[idx] = `seq=${seq} padding`;
    }
  }
}

function tryWrite(len) {
  if (len > MAX_MSG_SIZE) { addLog('error', `payload ${len} > max_msg_size ${MAX_MSG_SIZE}`); return -1; }

  const w = write_pos;
  const r = read_pos;
  const total = frameSize(len);
  const phys_w = mask(w);
  const tail = CAPACITY - phys_w;
  const seq = nextSeq;

  if (total > tail) {
    // Need sentinel wrap
    if ((w + tail + total) - r > CAPACITY) {
      addLog('error', `TryWrite 失败: 空间不足 (需要 sentinel ${tail}B + 帧 ${total}B, 可用 ${CAPACITY - (w - r)}B)`);
      return -1;
    }
    // Write sentinel
    writeU32(phys_w, SENTINEL);
    writeU32(phys_w + 4, 0);
    markSlots(phys_w, tail, 'sentinel', '哨兵: 回绕到 offset 0');
    addLog('sentinel', `插入哨兵 @ phys=${phys_w}, 跳过尾部 ${tail}B`);
    const new_w = w + tail;

    // Write frame at offset 0
    writeU32(0, len);
    writeU32(4, seq);
    markFrame(0, len, seq);
    write_pos = new_w + total;
    nextSeq++;
    addLog('write', `TryWrite: seq=${seq}, len=${len}, FrameSize=${total}, phys_w=0 (回绕后)`);
  } else {
    if ((w + total) - r > CAPACITY) {
      addLog('error', `TryWrite 失败: 空间不足 (需要 ${total}B, 可用 ${CAPACITY - (w - r)}B)`);
      return -1;
    }
    writeU32(phys_w, len);
    writeU32(phys_w + 4, seq);
    markFrame(phys_w, len, seq);
    write_pos = w + total;
    nextSeq++;
    addLog('write', `TryWrite: seq=${seq}, len=${len}, FrameSize=${total}, phys_w=${phys_w}`);
  }
  updateUI();
  return 0;
}

function forceWrite(len) {
  if (len > MAX_MSG_SIZE) { addLog('error', `payload ${len} > max_msg_size ${MAX_MSG_SIZE}`); return; }

  let w = write_pos;
  let r = read_pos;
  const total = frameSize(len);
  const phys_w = mask(w);
  const tail = CAPACITY - phys_w;
  const need_sentinel = total > tail;
  const cost = need_sentinel ? (tail + total) : total;
  const seq = nextSeq;

  let discarded = 0;
  while ((w + cost) - r > CAPACITY) {
    const phys_r = mask(r);
    const mh_len = readU32(phys_r);
    if (mh_len === SENTINEL) {
      const skip = CAPACITY - phys_r;
      markSlots(phys_r, skip, 'free', '');
      r += skip;
    } else {
      const fs = frameSize(mh_len);
      markSlots(phys_r, fs, 'free', '');
      r += fs;
      discarded++;
    }
  }
  if (discarded > 0) {
    addLog('error', `ForceWrite: 丢弃 ${discarded} 条旧消息`);
  }
  read_pos = r;

  if (need_sentinel) {
    writeU32(phys_w, SENTINEL);
    writeU32(phys_w + 4, 0);
    markSlots(phys_w, tail, 'sentinel', '哨兵: 回绕到 offset 0');
    addLog('sentinel', `插入哨兵 @ phys=${phys_w}, 跳过尾部 ${tail}B`);
    w += tail;
    writeU32(0, len);
    writeU32(4, seq);
    markFrame(0, len, seq);
    write_pos = w + total;
    nextSeq++;
    addLog('write', `ForceWrite: seq=${seq}, len=${len}, FrameSize=${total}, phys_w=0 (回绕后)`);
  } else {
    writeU32(phys_w, len);
    writeU32(phys_w + 4, seq);
    markFrame(phys_w, len, seq);
    write_pos = w + total;
    nextSeq++;
    addLog('write', `ForceWrite: seq=${seq}, len=${len}, FrameSize=${total}, phys_w=${phys_w}`);
  }
  updateUI();
}

function tryRead() {
  let r = read_pos;
  const w = write_pos;
  if (r >= w) { addLog('error', 'TryRead 失败: 缓冲区为空'); return -1; }

  let phys_r = mask(r);
  let mh_len = readU32(phys_r);

  if (mh_len === SENTINEL) {
    const skip = CAPACITY - phys_r;
    markSlots(phys_r, skip, 'free', '');
    addLog('sentinel', `读取遇到哨兵 @ phys=${phys_r}, 跳转到 offset 0`);
    r += skip;
    if (r >= w) { addLog('error', 'TryRead 失败: 跳过哨兵后缓冲区为空'); read_pos = r; updateUI(); return -1; }
    phys_r = mask(r);
    mh_len = readU32(phys_r);
  }

  const mh_seq = readU32(phys_r + 4);
  const fs = frameSize(mh_len);
  addLog('read', `TryRead: seq=${mh_seq}, len=${mh_len}, FrameSize=${fs}, phys_r=${phys_r}`);
  markSlots(phys_r, fs, 'free', '');
  read_pos = r + fs;
  updateUI();
  return 0;
}

// ============================================================
// UI
// ============================================================
function doTryWrite() {
  const len = parseInt(document.getElementById('payloadSize').value) || 1;
  tryWrite(len);
}
function doForceWrite() {
  const len = parseInt(document.getElementById('payloadSize').value) || 1;
  forceWrite(len);
}
function doTryRead() { tryRead(); }
function doReset() {
  write_pos = 0;
  read_pos = 0;
  nextSeq = 1;
  dataRegion = new Uint8Array(CAPACITY);
  slotMeta = new Array(NUM_SLOTS).fill('free');
  slotInfo = new Array(NUM_SLOTS).fill('');
  document.getElementById('logBox').innerHTML = '';
  addLog('info', '缓冲区已重置');
  updateUI();
}

const META_COLORS = {
  free: '#2a2a4a',
  header: '#00b894',
  payload: '#00cec9',
  pad: '#2d3436',
  sentinel: '#e17055',
  read: '#636e72',
};

function updateUI() {
  // State panel
  document.getElementById('sWritePos').textContent = write_pos;
  document.getElementById('sReadPos').textContent = read_pos;
  document.getElementById('sPhysW').textContent = mask(write_pos);
  document.getElementById('sPhysR').textContent = mask(read_pos);
  const used = write_pos - read_pos;
  document.getElementById('sUsed').textContent = `${used} / ${CAPACITY}`;
  document.getElementById('sSeq').textContent = nextSeq - 1;

  drawRing();
}

function drawRing() {
  const svg = document.getElementById('ringSvg');
  const cx = 200, cy = 200, R = 150, r = 95;
  const gap = 1.5;  // degrees gap between slots
  const slotAngle = 360 / NUM_SLOTS;
  const phys_w = mask(write_pos);
  const phys_r = mask(read_pos);
  const wSlot = phys_w / SLOT_SIZE;
  const rSlot = phys_r / SLOT_SIZE;

  let html = '';

  for (let i = 0; i < NUM_SLOTS; i++) {
    const startAngle = i * slotAngle - 90 + gap / 2;
    const endAngle = (i + 1) * slotAngle - 90 - gap / 2;
    const color = META_COLORS[slotMeta[i]] || META_COLORS.free;

    const sa = startAngle * Math.PI / 180;
    const ea = endAngle * Math.PI / 180;

    const x1o = cx + R * Math.cos(sa);
    const y1o = cy + R * Math.sin(sa);
    const x2o = cx + R * Math.cos(ea);
    const y2o = cy + R * Math.sin(ea);
    const x1i = cx + r * Math.cos(ea);
    const y1i = cy + r * Math.sin(ea);
    const x2i = cx + r * Math.cos(sa);
    const y2i = cy + r * Math.sin(sa);

    const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;

    const path = `M ${x1o} ${y1o} A ${R} ${R} 0 ${largeArc} 1 ${x2o} ${y2o} L ${x1i} ${y1i} A ${r} ${r} 0 ${largeArc} 0 ${x2i} ${y2i} Z`;

    const tooltip = slotInfo[i] ? `slot ${i} (offset ${i*8}): ${slotInfo[i]}` : `slot ${i} (offset ${i*8}): 空闲`;
    html += `<path d="${path}" fill="${color}" stroke="#1a1a2e" stroke-width="1">
      <title>${tooltip}</title>
    </path>`;

    // Slot number text
    const midAngle = ((startAngle + endAngle) / 2) * Math.PI / 180;
    const textR = (R + r) / 2;
    const tx = cx + textR * Math.cos(midAngle);
    const ty = cy + textR * Math.sin(midAngle);
    html += `<text x="${tx}" y="${ty}" fill="#888" font-size="9" text-anchor="middle" dominant-baseline="central" pointer-events="none">${i}</text>`;
  }

  // Write pointer (W)
  {
    const angle = (wSlot * slotAngle - 90) * Math.PI / 180;
    const px = cx + (R + 18) * Math.cos(angle);
    const py = cy + (R + 18) * Math.sin(angle);
    const ax = cx + R * Math.cos(angle);
    const ay = cy + R * Math.sin(angle);
    html += `<line x1="${px}" y1="${py}" x2="${ax}" y2="${ay}" stroke="#00b894" stroke-width="2.5" marker-end="none"/>`;
    html += `<circle cx="${px}" cy="${py}" r="12" fill="#00b894" opacity="0.9"/>`;
    html += `<text x="${px}" y="${py}" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central">W</text>`;
  }

  // Read pointer (R)
  {
    const angle = (rSlot * slotAngle - 90) * Math.PI / 180;
    const px = cx + (r - 18) * Math.cos(angle);
    const py = cy + (r - 18) * Math.sin(angle);
    const ax = cx + r * Math.cos(angle);
    const ay = cy + r * Math.sin(angle);
    html += `<line x1="${px}" y1="${py}" x2="${ax}" y2="${ay}" stroke="#0984e3" stroke-width="2.5"/>`;
    html += `<circle cx="${px}" cy="${py}" r="12" fill="#0984e3" opacity="0.9"/>`;
    html += `<text x="${px}" y="${py}" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central">R</text>`;
  }

  // Center text
  html += `<text x="${cx}" y="${cy - 12}" fill="#64ffda" font-size="13" font-weight="bold" text-anchor="middle">RingBuf</text>`;
  html += `<text x="${cx}" y="${cy + 8}" fill="#888" font-size="11" text-anchor="middle">${CAPACITY}B / ${NUM_SLOTS} slots</text>`;
  html += `<text x="${cx}" y="${cy + 26}" fill="#ffd43b" font-size="10" text-anchor="middle">used: ${write_pos - read_pos}B</text>`;

  svg.innerHTML = html;
}

function addLog(type, msg) {
  const box = document.getElementById('logBox');
  const div = document.createElement('div');
  div.className = `log-entry log-${type}`;
  div.textContent = msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// Initial render
updateUI();
addLog('info', `初始化: Capacity=${CAPACITY}, 每 slot ${SLOT_SIZE}B, max_msg_size=${MAX_MSG_SIZE}B`);
addLog('info', '帧格式: [MsgHeader 8B][payload][pad to 8B align]');
</script>
</body>
</html>
